services:
  # Backend API Node Service
  - type: web
    name: cordovaconnect-api
    env: node
    plan: free
    region: singapore # Adjust based on preference
    buildCommand: cd backend && npm install
    startCommand: cd backend && node server.js
    envVars:
      - key: PORT
        value: 5000
      - key: NODE_ENV
        value: production
      - key: DB_HOST
        fromDatabase:
          name: cordovaconnect-db
          property: host
      - key: DB_USER
        fromDatabase:
          name: cordovaconnect-db
          property: user
      - key: DB_PASS
        fromDatabase:
          name: cordovaconnect-db
          property: password
      - key: DB_NAME
        value: cordovaconnect
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        sync: false # Put your vercel domain here later

databases:
  - name: cordovaconnect-db
    plan: free
    region: singapore
